services:
  servicio-pedidos:
    build:
      context: ./servicio-pedidos
    image: servicio-pedidos:latest
    container_name: servicio-pedidos
    ports:
      - "8081:8081"
    environment:
      DB_URL: ${DB_URL:-jdbc:oracle:thin:@host.docker.internal:1521/XEPDB1}
      DB_USERNAME: ${DB_USERNAME:-CUIDADOMASCOTAS}
      DB_PASSWORD: ${DB_PASSWORD:-Mascotas123}

  servicio-citas:
    build:
      context: ./servicio-citas
    image: servicio-citas:latest
    container_name: servicio-citas
    ports:
      - "8082:8082"
    environment:
      DB_URL: ${DB_URL:-jdbc:oracle:thin:@host.docker.internal:1521/XEPDB1}
      DB_USERNAME: ${DB_USERNAME:-CUIDADOMASCOTAS}
      DB_PASSWORD: ${DB_PASSWORD:-Mascotas123}
